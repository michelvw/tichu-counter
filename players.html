<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Players</title>

    <script type="text/javascript">
      var host = "michelvw.github.io";
      if ((host == window.location.host) && (window.location.protocol != "https:"))
        window.location.protocol = "https";
    </script>

    <script type="text/javascript">
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js").catch(function (err) {
            console.warn("Service worker registration failed:", err);
          });
        });
      }
    </script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ee6e73">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="canonical" href="https://michelvw.github.io/tichu-counter/" />

    <link rel="stylesheet" href="main.css">

    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="js/materialize.min.js"></script>
  </head>
  <body>
    <nav>
      <div class="nav-wrapper">
        <ul id="nav-mobile" class="left">
          <li><a href="sessions.html" id="back"><i class="material-icons">arrow_back</i></a></li>
        </ul>
      </div>
    </nav>
    <div class="info-bar">
      <span>Players</span>
    </div>

    <div class="container" id="players-page">
      <section id="roster-panel">
        <ul class="collection" id="active-players-list"></ul>

        <div class="row add-player-row">
          <div class="input-field col s8">
            <input type="text" id="new-player-name" placeholder="New player name">
          </div>
          <div class="col s4">
            <a href="#" id="add-player-btn" class="waves-effect waves-light btn">Add</a>
          </div>
        </div>

        <a href="#" id="toggle-archived">Show archived players</a>
        <ul class="collection hidden" id="archived-players-list"></ul>
      </section>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/players-storage.js"></script>
    <script src="js/players.js"></script>
  </body>
</html>
