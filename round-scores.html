<!doctype html>
<html class="no-js" lang="en" manifest="manifest.appcache">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Round Scores</title>

    <script type="text/javascript">
      var host = "michelvw.github.io";
      if ((host == window.location.host) && (window.location.protocol != "https:"))
        window.location.protocol = "https";
    </script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ee6e73">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="canonical" href="https://michelvw.github.io/tichu-counter/" />
    
    <link rel="stylesheet" href="main.css">

    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="js/materialize.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Include Chart.js -->

    <style>
      /* Fullscreen graph mode: covers the viewport so the chart can use
         all available space (landscape rotation or manual toggle). */
      #graph-container.fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 12px;
        box-sizing: border-box;
        background-color: #ffffff;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #graph-container.fullscreen canvas {
        max-height: 100%;
        max-width: 100%;
      }
      #exit-fullscreen {
        display: none;
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10000;
        background-color: rgba(0, 0, 0, 0.6);
        color: #fff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        line-height: 40px;
        text-align: center;
        cursor: pointer;
      }
    </style>

  </head>
  <body>
    <nav>
      <div class="nav-wrapper">
        <a href="#" class="brand-logo center"></a>
        <ul id="nav-mobile" class="left">
          <li><a href="index.html" id="back"><i class="material-icons">arrow_back</i></a></li>
          <li><a href="#" id="toggle-view"><i class="material-icons">show_chart</i></a></li>
          <li><a href="#" id="fullscreen-toggle"><i class="material-icons">fullscreen</i></a></li>
        </ul>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        <!-- Table -->
        <div class="" id="table-container">
          <table id="round-scores" class="striped">
            <thead>
              <!-- Top row with merged columns -->
              <tr>
                <th></th>
                <th colspan="3" id="team-a-header">Team A</th>
                <th colspan="3" id="team-b-header">Team B</th>
              </tr>
              <!-- Second row with individual columns -->
              <tr>
                <th>#</th>
                <th id="team-a-total-points-label">Total</th>
                <th id="team-a-points-label">Round</th>
                <th id="team-a-tichu-label">Tichu</th>
                <th id="team-b-total-points-label">Total</th>
                <th id="team-b-points-label">Round</th>
                <th id="team-b-tichu-label">Tichu</th>
              </tr>
            </thead>
            <tbody>
              <!-- Scores will be dynamically added here -->
            </tbody>
          </table>
        </div>

        <!-- Graph -->
        <div class="hidden" id="graph-container">
          <canvas id="scoreChart"></canvas> <!-- Canvas for the graph -->
        </div>
      </div>
    </div>

    <!-- Visible only while the graph is in fullscreen mode -->
    <div id="exit-fullscreen"><i class="material-icons">close</i></div>

    <script>
      // Retrieve team names from localStorage
      const teamAName = localStorage.getItem("teamAName") || "Team A";
      const teamBName = localStorage.getItem("teamBName") || "Team B";

      // Update table headers and labels with team names
      document.getElementById("team-a-header").textContent = teamAName;
      document.getElementById("team-b-header").textContent = teamBName;

      // Load round scores from localStorage
      const roundScores = JSON.parse(localStorage.getItem("roundScores")) || [];
      const tableBody = document.querySelector("#round-scores tbody");

      // Data for the graph
      const labels = []; // Round numbers
      const teamAData = []; // Team A scores
      const teamBData = []; // Team B scores

      // Populate the table with round scores
      roundScores.forEach((round, index) => {
        // Calculate points for the current round
        const teamAPoints = index === 0 ? round.teamA : round.teamA - roundScores[index - 1].teamA;
        const teamBPoints = index === 0 ? round.teamB : round.teamB - roundScores[index - 1].teamB;

        const row = `
          <tr>
            <td>${index + 1}</td>
            <td>${round.teamA}</td> <!-- Total Points for Team A -->
            <td>${teamAPoints}</td> <!-- Points for Team A -->
            <td>${round.teamATichu}</td>
            <td>${round.teamB}</td> <!-- Total Points for Team B -->
            <td>${teamBPoints}</td> <!-- Points for Team B -->
            <td>${round.teamBTichu}</td>
          </tr>
        `;
        tableBody.innerHTML += row;

        // Add data for the graph
        labels.push(`${index + 1}`);
        teamAData.push(round.teamA);
        teamBData.push(round.teamB);
      });

      // --- Auto-scale the Y axis to the actual score range ---
      // Instead of forcing the axis to start at 0 (which wastes space and
      // squashes the two lines together when scores are e.g. -120..340),
      // scale to the real min/max of the data with a bit of padding.
      const allScores = [...teamAData, ...teamBData];
      let yMin = 0;
      let yMax = 100;
      if (allScores.length) {
        const rawMin = Math.min(...allScores);
        const rawMax = Math.max(...allScores);
        const range = rawMax - rawMin;
        // Padding: 15% of the range, but never less than 30 points so a
        // single round (range = 0) still gets a sensible axis.
        const padding = Math.max(30, Math.round(range * 0.15));
        yMin = Math.floor((rawMin - padding) / 10) * 10;
        yMax = Math.ceil((rawMax + padding) / 10) * 10;
      }

      // Create the graph
      const ctx = document.getElementById("scoreChart").getContext("2d");
      Chart.defaults.font.family = "sans-serif";
      Chart.defaults.font.weight = "bolder";
      Chart.defaults.font.size = 16;
      const scoreChart = new Chart(ctx, {
        type: "line", // Line chart
        data: {
          labels: labels, // Round numbers
          datasets: [
            {
              label: teamAName,
              data: teamAData,
              borderColor: "rgba(255, 99, 132, 1)", // Red line
              backgroundColor: "rgba(255, 99, 132, 0.2)", // Light red fill
              borderWidth: 2,
              fill: true,
            },
            {
              label: teamBName,
              data: teamBData,
              borderColor: "rgba(54, 162, 235, 1)", // Blue line
              backgroundColor: "rgba(54, 162, 235, 0.2)", // Light blue fill
              borderWidth: 2,
              fill: true,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "top",
            },
            title: {
              display: true,
              text: "Tichu Scores",
            },
          },
          elements: {
            line: {
                tension : 0.4  // smooth lines
            },
          },
          scales: {
            x: {
              title: {
                display: true,
                text: "Rounds",
              },
            },
            y: {
              beginAtZero: false,
              min: yMin,
              max: yMax,
              title: {
                display: true,
                text: "Points",
              },
            },
          },
        },
      });

      // Toggle between table and graph
      const toggleButton = document.getElementById("toggle-view");
      const tableContainer = document.getElementById("table-container");
      const graphContainer = document.getElementById("graph-container");
      const fullscreenButton = document.getElementById("fullscreen-toggle");
      const exitFullscreenButton = document.getElementById("exit-fullscreen");

      function isGraphActive() {
        return !graphContainer.classList.contains("hidden");
      }

      function setFullscreen(on) {
        if (on && isGraphActive()) {
          graphContainer.classList.add("fullscreen");
          exitFullscreenButton.style.display = "block";
        } else {
          graphContainer.classList.remove("fullscreen");
          exitFullscreenButton.style.display = "none";
        }
        // Give the layout a tick to settle, then resize the chart to fill
        // whatever space it now has.
        setTimeout(() => scoreChart.resize(), 50);
      }

      toggleButton.addEventListener("click", () => {
        if (tableContainer.classList.contains("hidden")) {
          tableContainer.classList.remove("hidden");
          graphContainer.classList.add("hidden");
          toggleButton.innerHTML = '<i class="material-icons">show_chart</i>';
          setFullscreen(false);
        } else {
          tableContainer.classList.add("hidden");
          graphContainer.classList.remove("hidden");
          toggleButton.innerHTML = '<i class="material-icons">list</i>';
          setTimeout(() => scoreChart.resize(), 50);
        }
      });

      // Manual fullscreen toggle button
      fullscreenButton.addEventListener("click", () => {
        setFullscreen(!graphContainer.classList.contains("fullscreen"));
      });
      exitFullscreenButton.addEventListener("click", () => setFullscreen(false));

      // Auto-fullscreen the graph when the phone is rotated to landscape
      // (and back to normal size when rotated back to portrait), but only
      // while the graph view is the active one.
      const landscapeQuery = window.matchMedia("(orientation: landscape)");
      function handleOrientationChange(e) {
        if (!isGraphActive()) return;
        setFullscreen(e.matches);
      }
      landscapeQuery.addEventListener("change", handleOrientationChange);

      // If the page loads already in landscape with the graph active,
      // reflect that immediately.
      if (landscapeQuery.matches) {
        setFullscreen(isGraphActive());
      }
    </script>
  </body>
</html>
